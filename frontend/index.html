<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Taskflow</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface2: #1c1c28;
      --border: #2a2a3d;
      --accent: #c8f135;
      --accent2: #7c3aed;
      --text: #e8e8f0;
      --muted: #6b6b80;
      --danger: #ff4757;
      --done-bg: #1a1f13;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Noise overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
      opacity: 0.4;
    }

    /* Grid background */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 60px 60px;
      opacity: 0.2;
      pointer-events: none;
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      max-width: 860px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    /* Header */
    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 56px;
      padding-bottom: 32px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 42px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -2px;
    }

    .logo span {
      color: var(--accent);
      display: inline-block;
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: blink 2s ease-in-out infinite;
    }

    .status-dot.error { background: var(--danger); animation: none; }

    @keyframes blink {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }

    /* Stats bar */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 20px 24px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--accent);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s ease;
    }

    .stat-card:hover::before { transform: scaleX(1); }
    .stat-card:hover { border-color: var(--accent); }

    .stat-num {
      font-family: 'Syne', sans-serif;
      font-size: 36px;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 6px;
      transition: transform 0.3s ease;
    }

    .stat-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    /* Form */
    .add-form {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 28px;
      margin-bottom: 32px;
      transition: border-color 0.2s;
    }

    .add-form:focus-within {
      border-color: var(--accent);
    }

    .form-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 16px;
      display: block;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }

    input, textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      padding: 12px 16px;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      resize: none;
    }

    input::placeholder, textarea::placeholder { color: var(--muted); }

    input:focus, textarea:focus {
      border-color: var(--accent);
      background: var(--surface2);
    }

    .btn {
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 12px 28px;
      border: none;
      cursor: pointer;
      transition: all 0.15s ease;
      position: relative;
      overflow: hidden;
    }

    .btn-primary {
      background: var(--accent);
      color: #0a0a0f;
    }

    .btn-primary:hover {
      background: #d9ff4a;
      transform: translateY(-1px);
    }

    .btn-primary:active { transform: translateY(0); }

    .btn-primary:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    .form-actions {
      display: flex;
      justify-content: flex-end;
    }

    /* Tasks list */
    .tasks-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .tasks-title {
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--muted);
    }

    .filter-btns {
      display: flex;
      gap: 4px;
    }

    .filter-btn {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      padding: 4px 12px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      transition: all 0.15s;
    }

    .filter-btn.active, .filter-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .tasks-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .task-item {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 20px 24px;
      display: grid;
      grid-template-columns: 24px 1fr auto;
      gap: 16px;
      align-items: start;
      transition: all 0.2s ease;
      animation: slideIn 0.25s ease forwards;
      opacity: 0;
      transform: translateY(8px);
    }

    @keyframes slideIn {
      to { opacity: 1; transform: translateY(0); }
    }

    .task-item:hover {
      border-color: var(--border);
      background: var(--surface2);
    }

    .task-item.done {
      background: var(--done-bg);
      border-color: #2a2a1a;
    }

    .task-item.done .task-title {
      text-decoration: line-through;
      color: var(--muted);
    }

    /* Checkbox */
    .task-check {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
      transition: all 0.15s;
      background: transparent;
    }

    .task-check:hover { border-color: var(--accent); }

    .task-check.checked {
      background: var(--accent);
      border-color: var(--accent);
    }

    .task-check.checked::after {
      content: '✓';
      font-size: 12px;
      color: #0a0a0f;
      font-weight: 900;
    }

    .task-body { min-width: 0; }

    .task-title {
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 4px;
      word-break: break-word;
    }

    .task-desc {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
      word-break: break-word;
    }

    .task-meta {
      font-size: 10px;
      color: var(--muted);
      margin-top: 8px;
      letter-spacing: 0.05em;
    }

    .task-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .icon-btn {
      width: 32px;
      height: 32px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: all 0.15s;
    }

    .icon-btn:hover { border-color: var(--danger); color: var(--danger); }
    .icon-btn.done-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 64px 24px;
      border: 1px dashed var(--border);
    }

    .empty-icon {
      font-size: 40px;
      margin-bottom: 16px;
      opacity: 0.3;
    }

    .empty-text {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .empty-sub {
      font-size: 12px;
      color: var(--muted);
      opacity: 0.6;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 32px;
      right: 32px;
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 14px 20px;
      font-size: 12px;
      z-index: 1000;
      animation: toastIn 0.2s ease;
      display: flex;
      align-items: center;
      gap: 10px;
      max-width: 300px;
    }

    .toast.success { border-left: 3px solid var(--accent); }
    .toast.error { border-left: 3px solid var(--danger); }

    @keyframes toastIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Loading */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 40px;
      color: var(--muted);
      font-size: 12px;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
  </style>
</head>
<body>
<div class="app">

  <header>
    <div class="logo">task<span>flow</span></div>
    <div class="status-pill">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">connecting...</span>
    </div>
  </header>

  <div class="stats">
    <div class="stat-card">
      <div class="stat-num" id="statTotal">—</div>
      <div class="stat-label">Total tasks</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statPending">—</div>
      <div class="stat-label">Pending</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statDone">—</div>
      <div class="stat-label">Completed</div>
    </div>
  </div>

  <div class="add-form">
    <span class="form-label">// new task</span>
    <div class="form-row">
      <input type="text" id="titleInput" placeholder="Task title..." maxlength="200"/>
      <input type="text" id="descInput" placeholder="Description (optional)..."/>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" id="addBtn" onclick="createTask()">+ Add task</button>
    </div>
  </div>

  <div class="tasks-header">
    <span class="tasks-title">// tasks</span>
    <div class="filter-btns">
      <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" onclick="setFilter('pending', this)">Pending</button>
      <button class="filter-btn" onclick="setFilter('done', this)">Done</button>
    </div>
  </div>

  <div id="tasksList"></div>

</div>

<script>
  const API = '/api';
  let tasks = [];
  let filter = 'all';

  async function checkHealth() {
    try {
      const r = await fetch(`${API}/health`);
      const data = await r.json();
      const dot = document.getElementById('statusDot');
      const txt = document.getElementById('statusText');
      if (data.status === 'ok') {
        dot.className = 'status-dot';
        txt.textContent = 'api connected';
      } else {
        dot.className = 'status-dot error';
        txt.textContent = 'db error';
      }
    } catch {
      document.getElementById('statusDot').className = 'status-dot error';
      document.getElementById('statusText').textContent = 'api offline';
    }
  }

  async function loadTasks() {
    const list = document.getElementById('tasksList');
    list.innerHTML = '<div class="loading"><div class="spinner"></div>loading tasks...</div>';
    try {
      const r = await fetch(`${API}/tasks`);
      tasks = await r.json();
      updateStats();
      renderTasks();
    } catch {
      list.innerHTML = '<div class="empty"><div class="empty-icon">⚡</div><div class="empty-text">Cannot reach API</div><div class="empty-sub">Make sure the backend is running</div></div>';
    }
  }

  function updateStats() {
    const done = tasks.filter(t => t.done).length;
    document.getElementById('statTotal').textContent = tasks.length;
    document.getElementById('statPending').textContent = tasks.length - done;
    document.getElementById('statDone').textContent = done;
  }

  function renderTasks() {
    const list = document.getElementById('tasksList');
    let filtered = tasks;
    if (filter === 'pending') filtered = tasks.filter(t => !t.done);
    if (filter === 'done') filtered = tasks.filter(t => t.done);

    if (filtered.length === 0) {
      list.innerHTML = `<div class="empty">
        <div class="empty-icon">${filter === 'done' ? '🎯' : '📋'}</div>
        <div class="empty-text">${filter === 'done' ? 'Nothing done yet' : 'No tasks here'}</div>
        <div class="empty-sub">${filter === 'all' ? 'Add your first task above' : 'Change the filter to see other tasks'}</div>
      </div>`;
      return;
    }

    list.innerHTML = filtered.map((t, i) => `
      <div class="task-item ${t.done ? 'done' : ''}" style="animation-delay:${i * 40}ms" id="task-${t.id}">
        <div class="task-check ${t.done ? 'checked' : ''}" onclick="toggleDone(${t.id}, ${t.done})"></div>
        <div class="task-body">
          <div class="task-title">${escHtml(t.title)}</div>
          ${t.description ? `<div class="task-desc">${escHtml(t.description)}</div>` : ''}
          <div class="task-meta">#${t.id} · ${formatDate(t.created_at)}</div>
        </div>
        <div class="task-actions">
          <button class="icon-btn" onclick="deleteTask(${t.id})" title="Delete">✕</button>
        </div>
      </div>
    `).join('');
  }

  async function createTask() {
    const title = document.getElementById('titleInput').value.trim();
    const desc = document.getElementById('descInput').value.trim();
    if (!title) { showToast('Title is required', 'error'); return; }

    const btn = document.getElementById('addBtn');
    btn.disabled = true;
    btn.textContent = 'adding...';

    try {
      const r = await fetch(`${API}/tasks`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, description: desc })
      });
      if (!r.ok) throw new Error();
      document.getElementById('titleInput').value = '';
      document.getElementById('descInput').value = '';
      showToast('Task created ✓', 'success');
      await loadTasks();
    } catch {
      showToast('Failed to create task', 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = '+ Add task';
    }
  }

  async function toggleDone(id, currentDone) {
    try {
      const r = await fetch(`${API}/tasks/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ done: !currentDone })
      });
      if (!r.ok) throw new Error();
      await loadTasks();
    } catch {
      showToast('Failed to update task', 'error');
    }
  }

  async function deleteTask(id) {
    const el = document.getElementById(`task-${id}`);
    if (el) { el.style.opacity = '0.3'; el.style.transform = 'translateX(8px)'; }
    try {
      const r = await fetch(`${API}/tasks/${id}`, { method: 'DELETE' });
      if (!r.ok) throw new Error();
      showToast('Task deleted', 'success');
      await loadTasks();
    } catch {
      showToast('Failed to delete task', 'error');
      await loadTasks();
    }
  }

  function setFilter(f, btn) {
    filter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderTasks();
  }

  function showToast(msg, type = 'success') {
    const existing = document.querySelector('.toast');
    if (existing) existing.remove();
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.innerHTML = `<span>${type === 'success' ? '✓' : '✕'}</span> ${msg}`;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function formatDate(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    return d.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
  }

  document.getElementById('titleInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') createTask();
  });

  checkHealth();
  loadTasks();
  setInterval(checkHealth, 30000);
</script>
</body>
</html>
